name: A2A Compliance Check

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  a2a-compliance:
    runs-on: ubuntu-latest
    name: A2A Protocol Compliance

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Build GitHub Action bundle
        run: npm run build:action

      # Start the mock A2A server for self-testing
      - name: Start mock A2A server
        run: |
          node dist/index.js mock --port 3334 --auth-token "ci-test-token" &
          # Wait for mock server to be ready (up to 15s)
          for i in $(seq 1 30); do
            curl -sf http://localhost:3334/.well-known/agent-card.json > /dev/null 2>&1 && break
            sleep 0.5
          done
          curl -sf http://localhost:3334/.well-known/agent-card.json > /dev/null || { echo "Mock server failed to start"; exit 1; }

      # Run compliance tests against our own mock server
      - name: Run A2A Compliance Suite
        id: compliance
        uses: ./action
        with:
          agent-url: http://localhost:3334
          auth-token: 'Bearer ci-test-token'
          badge-output: a2a-badge.svg
          report-output: a2a-compliance-report.json
          comment-on-pr: 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload compliance report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: a2a-compliance-report
          path: |
            a2a-compliance-report.json
            a2a-badge.svg

      - name: Compliance Summary
        if: always()
        run: |
          echo "Result: ${{ steps.compliance.outputs.result }}"
          echo "Passed: ${{ steps.compliance.outputs.passed }}/${{ steps.compliance.outputs.total }}"
          echo "Failed: ${{ steps.compliance.outputs.failed }}"
          echo "Warnings: ${{ steps.compliance.outputs.warnings }}"
